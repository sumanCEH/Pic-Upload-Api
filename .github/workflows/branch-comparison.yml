# GitHub Branch Comparison Agent - Production Grade
# 
# This workflow compares two branches and generates comprehensive reports.
# It uses industry-standard practices with latest action versions.
#
# Maintenance Notes:
# - Actions are pinned to specific versions for reproducibility
# - Configured for Node.js 24 compliance
# - Runs on latest Ubuntu LTS for security

name: Branch Comparison Agent

on:
  workflow_dispatch:
    inputs:
      branch1:
        description: 'First branch (typically production)'
        required: false
        default: 'main'
      branch2:
        description: 'Second branch (typically development)'
        required: false
        default: 'QA1'

jobs:
  compare_branches:
    runs-on: ubuntu-latest
    # Opt into Node.js 24 to ensure compatibility with GitHub Actions deprecation timeline
    # Node.js 20 will be removed on September 16, 2026
    # Reference: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.6.0
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.11'
      
      - name: Run Branch Comparison
        run: |
          python PictureUpload/scripts/branch_comparison_agent.py . ${{ inputs.branch1 }} ${{ inputs.branch2 }}
      
      - name: Display Comparison Report
        if: always()
        run: |
          echo "=== Latest Comparison Report ==="
          if [ -f "reports/latest_comparison.md" ]; then
            cat reports/latest_comparison.md
          else
            echo "No comparison report generated"
          fi
      
      - name: Upload Reports as Artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: comparison-reports
          path: reports/
          retention-days: 30
      
      - name: Commit Reports (Optional)
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet reports/latest_comparison.md; then
            echo "No changes in reports"
          else
            git add reports/
            git commit -m "docs: update branch comparison report [skip ci]" || echo "No changes to commit"
            git push || echo "Could not push (might lack permissions in this workflow)"
          fi
        continue-on-error: true
      
      - name: Create Issue Summary (Optional)
        if: always()
        run: |
          if [ -f "reports/latest_comparison.json" ]; then
            echo "Comparison complete. Report available in artifacts."
          fi

